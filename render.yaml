services:
  - type: web
    name: vuln-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vuln-tracker-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: vuln-tracker-db
    plan: free
